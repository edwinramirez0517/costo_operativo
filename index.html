<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Combustible - El Compadre</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">

    <style>
        :root { --azul: #012094; --rojo: #E1251B; --gris: #f4f7f6; }
        body { background-color: var(--gris); font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* MARCA DE AGUA - Asegúrate que el archivo se llame marca_agua.png */
        body::before {
            content: ""; position: fixed; top: 50%; left: 50%; width: 700px; height: 700px;
            transform: translate(-50%, -50%); background-image: url('marca_agua.png'); 
            background-repeat: no-repeat; background-position: center; background-size: contain;
            opacity: 0.05; pointer-events: none; z-index: -1;
        }

        .sidebar { min-height: 100vh; background-color: var(--azul); width: 260px; position: fixed; z-index: 100; }
        .logo-box { background: white; padding: 25px; text-align: center; border-bottom: 4px solid var(--rojo); }
        .logo-box img { max-width: 100%; height: auto; object-fit: contain; }
        
        .main-content { margin-left: 260px; padding: 30px; }
        .card-custom { border: none; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); background: white; margin-bottom: 20px; }
        .kpi-title { font-size: 0.8rem; font-weight: 800; color: #6c757d; text-transform: uppercase; }
        .kpi-value { font-size: 1.5rem; font-weight: 900; color: var(--azul); }

        .filter-group { background: white; padding: 15px 20px; border-radius: 10px; border-left: 5px solid var(--rojo); box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .dropdown-menu-custom { max-height: 250px; overflow-y: auto; width: 100%; min-width: 180px; padding: 10px; }
        
        .table-custom thead th { background-color: var(--azul) !important; color: white !important; }
        #tablaResumen tbody tr { cursor: pointer; transition: 0.2s; }
        #tablaResumen tbody tr:hover { background-color: #e9ecef !important; }
        
        .modal-header { background-color: var(--azul); color: white; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo-box">
        <img src="logo.png" alt="Logo El Compadre" onerror="this.style.display='none';">
    </div>
    <div class="p-4 mt-4">
        <h6 class="text-white opacity-50 small fw-bold mb-3">MENÚ LOGÍSTICA</h6>
        <button class="btn btn-outline-light w-100 mb-3 text-start border-0 active" onclick="location.reload()">
            <i class="fas fa-chart-line me-2"></i> Dashboard Costos
        </button>
    </div>
</div>

<div class="main-content">
    <div class="row align-items-center mb-4 g-3">
        <div class="col-md-3"><h2 class="fw-bold mb-0" style="color: var(--azul);">Combustible 2026</h2></div>
        <div class="col-md-9">
            <div class="filter-group d-flex gap-3 align-items-end justify-content-end flex-wrap">
                <div class="dropdown flex-grow-1" style="max-width: 180px;">
                    <label class="small fw-bold text-muted mb-1">Año:</label>
                    <button class="btn btn-outline-secondary w-100 text-start d-flex justify-content-between align-items-center" data-bs-toggle="dropdown">
                        <span id="labelAno">Todos</span> <i class="fas fa-chevron-down ms-2"></i>
                    </button>
                    <div class="dropdown-menu dropdown-menu-custom shadow" id="filterAno"></div>
                </div>
                <div class="dropdown flex-grow-1" style="max-width: 180px;">
                    <label class="small fw-bold text-muted mb-1">Mes:</label>
                    <button class="btn btn-outline-secondary w-100 text-start d-flex justify-content-between align-items-center" data-bs-toggle="dropdown">
                        <span id="labelMes">Todos</span> <i class="fas fa-chevron-down ms-2"></i>
                    </button>
                    <div class="dropdown-menu dropdown-menu-custom shadow" id="filterMes"></div>
                </div>
                <div class="dropdown flex-grow-1" style="max-width: 180px;">
                    <label class="small fw-bold text-muted mb-1">Semana:</label>
                    <button class="btn btn-outline-secondary w-100 text-start d-flex justify-content-between align-items-center" data-bs-toggle="dropdown">
                        <span id="labelSemana">Todas</span> <i class="fas fa-chevron-down ms-2"></i>
                    </button>
                    <div class="dropdown-menu dropdown-menu-custom shadow" id="filterSemana"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-md-3"><div class="card card-custom p-3 border-start border-4 border-primary"><div class="kpi-title">Gasto Total</div><div class="kpi-value" id="kpi-total">L. 0.00</div></div></div>
        <div class="col-md-3"><div class="card card-custom p-3 border-start border-4 border-success"><div class="kpi-title">Galones</div><div class="kpi-value text-success" id="kpi-galones">0.00</div></div></div>
        <div class="col-md-3"><div class="card card-custom p-3 border-start border-4 border-info"><div class="kpi-title">Litros</div><div class="kpi-value text-info" id="kpi-litros">0.00</div></div></div>
        <div class="col-md-3"><div class="card card-custom p-3 bg-danger text-white"><div class="small fw-bold opacity-75">TOP DEPTO</div><div class="h5 fw-bold mb-0 text-truncate" id="kpi-top">-</div></div></div>
    </div>

    <div class="row">
        <div class="col-md-7">
            <div class="card card-custom p-4">
                <h5 class="fw-bold mb-4 text-secondary">Resumen por Departamento</h5>
                <div class="table-responsive">
                    <table id="tablaResumen" class="table table-striped table-bordered table-hover w-100 table-custom">
                        <thead><tr><th>Departamento</th><th>Galones</th><th>Litros</th><th>Total Lps.</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="col-md-5">
            <div class="card card-custom p-4 mb-3">
                <h6 class="fw-bold text-secondary mb-3">Distribución por Combustible</h6>
                <div style="height: 220px;"><canvas id="chartTipos"></canvas></div>
            </div>
            <div class="card card-custom p-4">
                <h6 class="fw-bold text-secondary mb-3">Top 10 Vehículos (Mayor Gasto)</h6>
                <div style="height: 220px;"><canvas id="chartVehiculos"></canvas></div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalDetalle" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content card-custom overflow-hidden">
            <div class="modal-header"><h5 class="modal-title fw-bold" id="modalTitle">Detalles</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <div class="modal-body p-4">
                <div class="row mb-4 bg-light p-3 rounded g-3 border">
                    <div class="col-md-4"><label class="small fw-bold">Año:</label><select class="form-select form-select-sm" id="modalFiltroAño"></select></div>
                    <div class="col-md-4"><label class="small fw-bold">Mes:</label><select class="form-select form-select-sm" id="modalFiltroMes"></select></div>
                    <div class="col-md-4"><label class="small fw-bold">Semana:</label><select class="form-select form-select-sm" id="modalFiltroSemana"></select></div>
                </div>
                <table id="tablaModalDetalle" class="table table-striped table-bordered w-100 small table-custom">
                    <thead><tr><th>Fecha</th><th>Vehículo</th><th>Placa</th><th>Combustible</th><th>Cant.</th><th>Total Lps.</th><th>Proveedor</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

<script>
Chart.register(ChartDataLabels);
let rawData = [], dtResumen, dtModal, chartTipos, chartVehiculos;
let deptoActual = "";

$(document).ready(function() {
    dtResumen = $('#tablaResumen').DataTable({ 
        language: { url: '//cdn.datatables.net/plug-ins/1.13.4/i18n/es-ES.json' },
        pageLength: 10, lengthMenu: [[10, 25, 50, -1], [10, 25, 50, "Todos"]], order: [[3, 'desc']]
    });
    dtModal = $('#tablaModalDetalle').DataTable({ 
        language: { url: '//cdn.datatables.net/plug-ins/1.13.4/i18n/es-ES.json' },
        pageLength: 15, order: [[0, 'desc']]
    });

    $('.dropdown-menu').on('click', e => e.stopPropagation());
    
    // Filtros Modal
    $('#modalFiltroAño').on('change', () => { actFiltrosModal('ano'); filtrarTablaModal(); });
    $('#modalFiltroMes').on('change', () => { actFiltrosModal('mes'); filtrarTablaModal(); });
    $('#modalFiltroSemana').on('change', filtrarTablaModal);

    cargarDatos();

    $('#tablaResumen tbody').on('click', 'tr', function() {
        let data = dtResumen.row(this).data();
        if(data) abrirDetalle($(data[0]).text());
    });
});

async function cargarDatos() {
    try {
        const [resG, resL] = await Promise.all([
            fetch('combustible_galon.csv').then(r => r.text()),
            fetch('combustible_litro.csv').then(r => r.text())
        ]);
        const cfg = { header: true, delimiter: ";", skipEmptyLines: true, transformHeader: h => h.trim() };
        let g = Papa.parse(resG, cfg).data.map(r => ({...r, unidad: 'Gal'}));
        let l = Papa.parse(resL, cfg).data.map(r => ({...r, unidad: 'Lts'}));
        rawData = [...g, ...l];
        iniciarFiltros();
    } catch (e) { console.error(e); }
}

function iniciarFiltros() {
    let años = [...new Set(rawData.map(r => r.AÑO))].filter(Boolean).sort();
    let meses = [...new Set(rawData.map(r => r.MES))].filter(Boolean);
    let semanas = [...new Set(rawData.map(r => r.SEMANA))].filter(Boolean).sort((a,b) => (parseInt(a.replace(/\D/g, ''))||0) - (parseInt(b.replace(/\D/g, ''))||0));

    const buildCheck = (id, val) => `<div class="form-check filter-item"><input class="form-check-input chk-${id}" type="checkbox" value="${val}" checked onchange="aplicarCascada()"><label class="form-check-label">${val}</label></div>`;
    
    $('#filterAno').html(años.map(a => buildCheck('ano', a)).join(''));
    $('#filterMes').html(meses.map(m => buildCheck('mes', m)).join(''));
    $('#filterSemana').html(semanas.map(s => buildCheck('sem', s)).join(''));

    $('#modalFiltroAño').html('<option value="TODOS">Todos</option>' + años.map(a => `<option value="${a}">${a}</option>`).join(''));
    
    aplicarCascada();
}

function aplicarCascada() {
    let anosSel = $('.chk-ano:checked').map(function() { return $(this).val(); }).get();
    let mesesSel = $('.chk-mes:checked').map(function() { return $(this).val(); }).get();
    let semSel = $('.chk-sem:checked').map(function() { return $(this).val(); }).get();

    let filtrados = rawData.filter(r => anosSel.includes(r.AÑO) && mesesSel.includes(r.MES) && semSel.includes(r.SEMANA));
    procesarDashboard(filtrados);
}

function procesarDashboard(datos) {
    let resumen = {}, tipos = {}, vehiculos = {}, totalLps = 0, totalGal = 0, totalLit = 0;

    datos.forEach(r => {
        let depto = r.SOLICITANTE || 'SIN ESPECIFICAR';
        // UNIFICACIÓN DE COMBUSTIBLE: Limpiar espacios y normalizar a mayúsculas
        let tipo = (r.COMBUSTIBLE || 'SIN ESPECIFICAR').trim().toUpperCase();
        let vehic = (r.VEHICULO || 'OTRO').trim().toUpperCase();
        let valor = parseFloat(r['TOTAL VALOR LPS']?.replace(/[L\s,]/g, '')) || 0;
        let cant = parseFloat(r.ABASTECIDO) || 0;

        if (!resumen[depto]) resumen[depto] = { gal: 0, lts: 0, costo: 0 };
        resumen[depto].costo += valor;
        if (r.unidad === 'Gal') { resumen[depto].gal += cant; totalGal += cant; }
        else { resumen[depto].lts += cant; totalLit += cant; }
        
        totalLps += valor;
        tipos[tipo] = (tipos[tipo] || 0) + valor;
        vehiculos[vehic] = (vehiculos[vehic] || 0) + valor;
    });

    $('#kpi-total').text('L. ' + totalLps.toLocaleString('en-US', {minimumFractionDigits: 2}));
    $('#kpi-galones').text(totalGal.toLocaleString('en-US'));
    $('#kpi-litros').text(totalLit.toLocaleString('en-US'));
    let top = Object.keys(resumen).length > 0 ? Object.keys(resumen).reduce((a, b) => resumen[a].costo > resumen[b].costo ? a : b) : '-';
    $('#kpi-top').text(top);

    dtResumen.clear();
    for (let d in resumen) {
        dtResumen.row.add([`<span class="fw-bold">${d}</span>`, resumen[d].gal.toFixed(2), resumen[d].lts.toFixed(2), 'L. ' + resumen[d].costo.toLocaleString()]);
    }
    dtResumen.draw();

    renderCharts(tipos, vehiculos);
}

function renderCharts(tipos, vehiculos) {
    if (chartTipos) chartTipos.destroy();
    chartTipos = new Chart(document.getElementById('chartTipos'), {
        type: 'doughnut',
        data: { labels: Object.keys(tipos), datasets: [{ data: Object.values(tipos), backgroundColor: ['#E1251B', '#012094', '#FFCE56', '#2ecc71'] }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { datalabels: { color: '#fff', formatter: (v, c) => {
            let sum = 0; c.chart.data.datasets[0].data.forEach(d => sum += d);
            return (v * 100 / sum).toFixed(1) + "%";
        }}}}
    });

    if (chartVehiculos) chartVehiculos.destroy();
    let sortedVehic = Object.entries(vehiculos).sort((a,b) => b[1] - a[1]).slice(0, 10);
    chartVehiculos = new Chart(document.getElementById('chartVehiculos'), {
        type: 'bar',
        data: { labels: sortedVehic.map(v => v[0]), datasets: [{ label: 'Gasto Lps', data: sortedVehic.map(v => v[1]), backgroundColor: '#012094' }] },
        options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { datalabels: { display: false } } }
    });
}

function abrirDetalle(depto) {
    deptoActual = $('<div>').html(depto).text(); 
    $('#modalTitle').text('Detalles: ' + deptoActual);
    $('#modalFiltroAño').val('TODOS');
    actFiltrosModal('ano');
    new bootstrap.Modal('#modalDetalle').show();
}

function actFiltrosModal(orig) {
    let año = $('#modalFiltroAño').val(), mes = $('#modalFiltroMes').val();
    let sub = rawData.filter(r => (r.SOLICITANTE || 'SIN ESPECIFICAR') === deptoActual);
    if(orig === 'ano') {
        let ms = [...new Set(sub.filter(r => año === 'TODOS' || r.AÑO === año).map(r => r.MES))];
        $('#modalFiltroMes').html('<option value="TODOS">Todos</option>' + ms.map(m => `<option value="${m}">${m}</option>`).join(''));
        $('#modalFiltroMes').val('TODOS'); mes = 'TODOS';
    }
    let ss = [...new Set(sub.filter(r => (año === 'TODOS' || r.AÑO === año) && (mes === 'TODOS' || r.MES === mes)).map(r => r.SEMANA))].sort();
    $('#modalFiltroSemana').html('<option value="TODOS">Todas</option>' + ss.map(s => `<option value="${s}">${s}</option>`).join(''));
    $('#modalFiltroSemana').val('TODOS');
    filtrarTablaModal();
}

function filtrarTablaModal() {
    let año = $('#modalFiltroAño').val(), mes = $('#modalFiltroMes').val(), sem = $('#modalFiltroSemana').val();
    let f = rawData.filter(r => (r.SOLICITANTE || 'SIN ESPECIFICAR') === deptoActual && (año === 'TODOS' || r.AÑO === año) && (mes === 'TODOS' || r.MES === mes) && (sem === 'TODOS' || r.SEMANA === sem));
    dtModal.clear();
    f.forEach(r => dtModal.row.add([r.FECHA, r.VEHICULO, r['#PLACA'], (r.COMBUSTIBLE || '').trim().toUpperCase(), parseFloat(r.ABASTECIDO).toFixed(2) + ' ' + r.unidad, 'L. ' + parseFloat(r['TOTAL VALOR LPS']?.replace(/[L\s,]/g, '') || 0).toLocaleString(), r.PROVEEDOR]));
    dtModal.draw();
}
</script>
</body>
</html>
