<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Gerencial - El Compadre</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">

    <style>
        :root {
            --azul-compadre: #012094;
            --rojo-compadre: #E1251B;
        }
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .sidebar {
            min-height: 100vh;
            background-color: var(--azul-compadre);
            color: white;
        }
        .sidebar a {
            color: #d1d8f0;
            text-decoration: none;
            padding: 15px;
            display: block;
            transition: 0.3s;
            font-weight: 500;
        }
        .sidebar a:hover, .sidebar a.active {
            background-color: #011875;
            color: white;
            border-left: 4px solid var(--rojo-compadre);
        }
        .kpi-card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .kpi-card:hover {
            transform: translateY(-5px);
        }
        .icon-box {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .bg-compadre-blue { background-color: var(--azul-compadre) !important; }
        .bg-compadre-red { background-color: var(--rojo-compadre) !important; }
        .text-compadre-blue { color: var(--azul-compadre) !important; }
        .text-compadre-red { color: var(--rojo-compadre) !important; }
        .chart-container {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 d-none d-md-block sidebar p-0">
            <div class="p-4 text-center border-bottom border-secondary" style="background-color: white;">
                <h4 class="m-0 text-compadre-blue" style="font-weight: 900;">EL COMPADRE</h4>
            </div>
            <div class="mt-3">
                <a href="#" class="active"><i class="fas fa-gas-pump me-2"></i> Combustible</a>
                <a href="#"><i class="fas fa-users me-2"></i> Salarios</a>
                <a href="#"><i class="fas fa-box-open me-2"></i> Suministros</a>
            </div>
        </nav>

        <main class="col-md-10 ms-sm-auto px-md-4 py-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-2 mb-4 border-bottom">
                <h1 class="h2 text-compadre-blue" style="font-weight: bold;">Dashboard de Costos</h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                    <select class="form-select me-2" id="filtroClasificacion">
                        <option value="TODOS">MAYOREO Y DETALLE</option>
                        <option value="MAYOREO">SOLO MAYOREO</option>
                        <option value="DETALLE">SOLO DETALLE</option>
                    </select>
                    <button class="btn" style="background-color: var(--rojo-compadre); color: white;" id="btnLoad">
                        <i class="fas fa-sync me-1"></i> Actualizar Datos
                    </button>
                </div>
            </div>

            <div id="loading" class="text-center mb-4 text-compadre-blue">
                <div class="spinner-border" role="status"></div>
                <p>Leyendo archivos CSV desde GitHub...</p>
            </div>

            <div class="row mb-4" id="kpi-section" style="display:none;">
                <div class="col-xl-4 col-md-6 mb-4">
                    <div class="card kpi-card h-100 py-2 border-left-primary">
                        <div class="card-body">
                            <div class="row no-gutters align-items-center">
                                <div class="col mr-2">
                                    <div class="text-xs font-weight-bold text-compadre-blue text-uppercase mb-1">Costo Total (Lps)</div>
                                    <div class="h4 mb-0 font-weight-bold text-gray-800" id="kpi-costo-total">L. 0.00</div>
                                </div>
                                <div class="col-auto">
                                    <div class="icon-box bg-compadre-blue text-white"><i class="fas fa-money-bill-wave"></i></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-xl-4 col-md-6 mb-4">
                    <div class="card kpi-card h-100 py-2">
                        <div class="card-body">
                            <div class="row no-gutters align-items-center">
                                <div class="col mr-2">
                                    <div class="text-xs font-weight-bold text-compadre-red text-uppercase mb-1">Mayor Consumidor</div>
                                    <div class="h5 mb-0 font-weight-bold text-gray-800" id="kpi-mayor-consumidor">-</div>
                                </div>
                                <div class="col-auto">
                                    <div class="icon-box bg-compadre-red text-white"><i class="fas fa-truck"></i></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-xl-4 col-md-6 mb-4">
                    <div class="card kpi-card h-100 py-2">
                        <div class="card-body">
                            <div class="row no-gutters align-items-center">
                                <div class="col mr-2">
                                    <div class="text-xs font-weight-bold text-success text-uppercase mb-1">Registros Procesados</div>
                                    <div class="h5 mb-0 font-weight-bold text-gray-800" id="kpi-registros">0</div>
                                </div>
                                <div class="col-auto">
                                    <div class="icon-box bg-success text-white"><i class="fas fa-database"></i></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row mt-2" id="table-section" style="display:none;">
                <div class="col-12">
                    <div class="chart-container">
                        <h5 class="text-compadre-blue mb-4" style="font-weight: bold;">Gasto Consolidado por Departamento</h5>
                        <div class="table-responsive">
                            <table id="tablaGeneral" class="table table-striped table-bordered" style="width:100%">
                                <thead>
                                    <tr>
                                        <th>Departamento (Solicitante)</th>
                                        <th>Total Galones (Lps)</th>
                                        <th>Total Litros (Lps)</th>
                                        <th>Gasto General (Lps)</th>
                                    </tr>
                                </thead>
                                <tbody id="tablaCuerpo">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
    let dataTable;

    $(document).ready(function() {
        cargarDatosCSV();

        $('#btnLoad').click(function() {
            cargarDatosCSV();
        });
    });

    function cargarDatosCSV() {
        $('#loading').show();
        $('#kpi-section, #table-section').hide();

        // Leer ambos archivos alojados en el mismo repositorio de GitHub
        Promise.all([
            fetch('combustible_galon.csv').then(res => res.text()).catch(() => ""),
            fetch('combustible_litro.csv').then(res => res.text()).catch(() => "")
        ]).then(responses => {
            
            // Parsear con delimitador de punto y coma (;)
            const config = { header: true, delimiter: ";", skipEmptyLines: true };
            const galonesData = Papa.parse(responses[0], config).data;
            const litrosData = Papa.parse(responses[1], config).data;

            procesarYMostrarDatos(galonesData, litrosData);
        });
    }

    function limpiarNumero(valor) {
        if (!valor) return 0;
        // Eliminar comas, "L", espacios y convertir a float
        let numStr = valor.toString().replace(/[L\s,]/g, '');
        let num = parseFloat(numStr);
        return isNaN(num) ? 0 : num;
    }

    function procesarYMostrarDatos(galonesData, litrosData) {
        let resumenDepartamentos = {};
        let totalGeneral = 0;

        // Procesar Galones
        galonesData.forEach(row => {
            let depto = row['SOLICITANTE'] || row['solicitante'] || 'SIN ESPECIFICAR';
            let valor = limpiarNumero(row['TOTAL VALOR LPS']);
            
            if (!resumenDepartamentos[depto]) {
                resumenDepartamentos[depto] = { galones: 0, litros: 0, total: 0 };
            }
            resumenDepartamentos[depto].galones += valor;
            resumenDepartamentos[depto].total += valor;
            totalGeneral += valor;
        });

        // Procesar Litros
        litrosData.forEach(row => {
            let depto = row['SOLICITANTE'] || row['solicitante'] || 'SIN ESPECIFICAR';
            let valor = limpiarNumero(row['TOTAL VALOR LPS']);
            
            if (!resumenDepartamentos[depto]) {
                resumenDepartamentos[depto] = { galones: 0, litros: 0, total: 0 };
            }
            resumenDepartamentos[depto].litros += valor;
            resumenDepartamentos[depto].total += valor;
            totalGeneral += valor;
        });

        // Actualizar UI
        $('#kpi-costo-total').text('L. ' + totalGeneral.toLocaleString('es-HN', {minimumFractionDigits: 2}));
        $('#kpi-registros').text(galonesData.length + litrosData.length);

        // Encontrar Mayor Consumidor
        let mayorConsumidor = '-';
        let maxValor = 0;
        
        let htmlTabla = '';
        for (let depto in resumenDepartamentos) {
            let d = resumenDepartamentos[depto];
            if (d.total > maxValor) {
                maxValor = d.total;
                mayorConsumidor = depto;
            }
            
            htmlTabla += `<tr>
                <td class="fw-bold">${depto}</td>
                <td>L. ${d.galones.toLocaleString('es-HN', {minimumFractionDigits: 2})}</td>
                <td>L. ${d.litros.toLocaleString('es-HN', {minimumFractionDigits: 2})}</td>
                <td class="text-compadre-blue fw-bold">L. ${d.total.toLocaleString('es-HN', {minimumFractionDigits: 2})}</td>
            </tr>`;
        }

        $('#kpi-mayor-consumidor').text(mayorConsumidor);
        
        // Renderizar Tabla
        if(dataTable) {
            dataTable.destroy();
        }
        
        $('#tablaCuerpo').html(htmlTabla);
        
        dataTable = $('#tablaGeneral').DataTable({
            language: { url: '//cdn.datatables.net/plug-ins/1.13.4/i18n/es-ES.json' },
            order: [[ 3, "desc" ]], // Ordenar por la columna de Gasto General de mayor a menor
            pageLength: 10
        });

        $('#loading').hide();
        $('#kpi-section, #table-section').fadeIn();
    }
</script>

</body>
</html>
